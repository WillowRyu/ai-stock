<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="up" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="down" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#dc2626"/>
      <stop offset="1" stop-color="#f87171"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.6">
    <line x1="0" y1="170" x2="512" y2="170"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="342" x2="512" y2="342"/>
  </g>

  <!-- Candle 1: small red (descending sentiment) -->
  <g>
    <line x1="120" y1="190" x2="120" y2="380" stroke="url(#down)" stroke-width="14" stroke-linecap="round"/>
    <rect x="93" y="240" width="54" height="120" rx="10" fill="url(#down)"/>
  </g>

  <!-- Candle 2: medium green -->
  <g>
    <line x1="256" y1="140" x2="256" y2="370" stroke="url(#up)" stroke-width="14" stroke-linecap="round"/>
    <rect x="229" y="180" width="54" height="170" rx="10" fill="url(#up)"/>
  </g>

  <!-- Candle 3: tall green (rising sentiment) -->
  <g>
    <line x1="392" y1="100" x2="392" y2="340" stroke="url(#up)" stroke-width="14" stroke-linecap="round"/>
    <rect x="365" y="130" width="54" height="200" rx="10" fill="url(#up)"/>
  </g>

  <!-- Rising arrow accent -->
  <g fill="none" stroke="#a7f3d0" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
    <polyline points="120,310 256,250 392,180"/>
    <polyline points="356,180 392,180 392,216"/>
  </g>

  <!-- Tiny dot accents on close prices for polish -->
  <g fill="#ecfdf5">
    <circle cx="120" cy="310" r="6"/>
    <circle cx="256" cy="250" r="6"/>
    <circle cx="392" cy="180" r="8"/>
  </g>
</svg>
